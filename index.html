<script>
    const LIFF_ID = "2009817385-L8mRsQQ7";
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx5XSNNWpjGjMtqdr4yput0B_pipzfbb4Hkl0TcpQHAEbdL2isZZaVJ9C5iqQlbyyYr/exec";
    let lineUserId = "";

    async function initializeLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                lineUserId = profile.userId;
                document.getElementById('name').value = profile.displayName;
            } else {
                liff.login();
            }
        } catch (err) {
            console.error('LIFF Initialization failed', err);
        }
    }
    initializeLiff();

    document.getElementById('feedbackForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const successMessage = document.getElementById('success-message');
        const form = document.getElementById('feedbackForm');

        btn.disabled = true;
        btn.style.display = 'none';
        loading.style.display = 'block';

        const data = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            message: document.getElementById('message').value,
            lineUserId: lineUserId
        };

        // ▼ ここに魔法の2行（modeとheaders）を追加しました！ ▼
        fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // セキュリティエラーを回避する魔法のコード
            headers: {
                'Content-Type': 'text/plain' // 通信をシンプルにして警戒されないようにする
            },
            body: JSON.stringify(data)
        })
        .then(() => {
            loading.style.display = 'none';
            form.style.display = 'none';
            successMessage.style.display = 'block';
            setTimeout(() => { liff.closeWindow(); }, 3000);
        })
        .catch(error => {
            alert('送信に失敗しました。もう一度お試しください。');
            btn.disabled = false;
            btn.style.display = 'block';
            loading.style.display = 'none';
        });
    });
</script>
